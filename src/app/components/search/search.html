<div class="relative flex items-center">
  <input
    type="text"
    placeholder="Search articles..."
    [ngModel]="searchInput()"
    (ngModelChange)="searchInput.set($event)"
    class="flex-1 px-3 py-2 pr-9 text-base border border-gray-300 rounded transition-colors focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600"
    aria-label="Search articles"
    role="search"
  />
  @if (searchInput()) {
    <button
      class="absolute right-2 bg-transparent border-none text-lg cursor-pointer text-gray-600 p-1 flex items-center justify-center transition-colors hover:text-gray-900 focus:outline-2 focus:outline-blue-600 focus:outline-offset-2"
      (click)="onResetSearch()"
      aria-label="Clear search"
      type="button"
    >
      ×
    </button>
  }
</div>

@if (filteredArticles().length > 0) {
  <div class="mt-4 space-y-4">
    @for (article of filteredArticles(); track article.id) {
      <article class="border border-gray-200 rounded-lg p-4 bg-white shadow-sm">
        <h3 class="text-lg font-semibold text-gray-900 mb-2">
          <span [innerHTML]="article.title | highlight: searchInput()"></span>
        </h3>
        <p class="text-gray-700 leading-relaxed">
          <span [innerHTML]="article.text | highlight: searchInput()"></span>
        </p>
      </article>
    }
  </div>
}

@if (searchInput() && filteredArticles().length === 0) {
  <div class="mt-4 text-center text-gray-500">No articles found matching "{{ searchInput() }}"</div>
}
